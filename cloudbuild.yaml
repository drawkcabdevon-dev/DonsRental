steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - >-
        ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - .
    id: Build

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - >-
        ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
    id: Push

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - >-
        ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 512Mi
      - --timeout
      - '300'
      - --concurrency
      - '80'
      - --set-env-vars
      - >-
        AGENT_ENGINE=${_AGENT_ENGINE},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=us-central1
    id: Deploy
    waitFor:
      - Push

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE_NAME}
      - --region=${_REGION}
      - --update-env-vars=GEMINI_API_KEY=$$GEMINI_API_KEY
    id: Set-Gemini-Key
    waitFor:
      - Deploy
    secretEnv:
      - GEMINI_API_KEY

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/gemini-api-key/versions/2
      env: GEMINI_API_KEY

substitutions:
  _SERVICE_NAME: donsrental
  _REGION: europe-west1
  _ARTIFACT_REPO: cloud-run-source-deploy
  _AGENT_ENGINE: >-
    projects/450188951493/locations/us-central1/reasoningEngines/8385401789733666816

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
