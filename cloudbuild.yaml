steps:
  - name: gcr.io/k8s-skaffold/pack
    entrypoint: pack
    args:
      - build
      - >-
        ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}
      - --builder=gcr.io/buildpacks/builder:latest
      - --network=host
    id: Build

  - name: gcr.io/cloud-builders/docker
    entrypoint: docker
    args:
      - push
      - >-
        ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}
    id: Push

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - >-
        ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 512Mi
      - --timeout
      - 300
      - --concurrency
      - '80'
      - --set-env-vars
      - >-
        AGENT_ENGINE=${_AGENT_ENGINE},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION}
    id: Deploy
    waitFor:
      - Push

substitutions:
  _SERVICE_NAME: dons-rental
  _REGION: us-central1
  _ARTIFACT_REPO: cloud-run-source-deploy
  _AGENT_ENGINE: >-
    projects/450188951493/locations/us-central1/reasoningEngines/8385401789733666816

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
