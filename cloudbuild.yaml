steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - >-
        ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - .
    id: Build

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - >-
        ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
    id: Push

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - >-
        ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 512Mi
      - --timeout
      - '300'
      - --concurrency
      - '80'
      - --set-secrets
      - >-
        GEMINI_API_KEY=gemini-api-key:latest,GOOGLE_SHEETS_CREDENTIALS=google-sheets-credentials:latest
      - --set-env-vars
      - >-
        AGENT_ENGINE=${_AGENT_ENGINE},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=us-central1,SPREADSHEET_ID=${_SPREADSHEET_ID},OWNER_EMAIL=${_OWNER_EMAIL},GCS_BUCKET=${_GCS_BUCKET},GCS_PHOTOS_PREFIX=${_GCS_PHOTOS_PREFIX}
    id: Deploy
    waitFor:
      - Push

substitutions:
  _SERVICE_NAME: donsrental
  _REGION: europe-west1
  _ARTIFACT_REPO: cloud-run-source-deploy
  _AGENT_ENGINE: projects/282546523551/locations/us-central1/reasoningEngines/4084942433152925696
  _SPREADSHEET_ID: 1i8rkv11Zmuv_btAiJNji1MAj9GylHOJZEUucAqqb6-0
  _OWNER_EMAIL: devon@onlineverywhere.com
  _GCS_BUCKET: donsrental-license-photos
  _GCS_PHOTOS_PREFIX: license-photos

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
